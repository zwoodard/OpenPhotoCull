name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust (with both macOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build & release (universal macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenPhotoCull ${{ github.ref_name }}"
          releaseBody: |
            Unsigned macOS build (universal: Intel + Apple Silicon).

            **First-time install:** macOS will block the app because it isn't signed. Either:
              - Right-click the app in /Applications → Open → Open, or
              - Run `xattr -cr /Applications/OpenPhotoCull.app` after copying it.
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

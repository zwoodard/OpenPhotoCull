name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust (with both macOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install build tools (nasm for turbojpeg-sys SIMD)
        run: brew install nasm

      - name: Install npm dependencies
        run: npm ci

      - name: Build & release (universal macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenPhotoCull ${{ github.ref_name }}"
          releaseBody: |
            Ad-hoc signed macOS build (universal: Intel + Apple Silicon).
            Not notarized — first launch needs a one-time approval.

            **Install:**
            1. Download the `.dmg`, open it, drag `OpenPhotoCull.app` to `/Applications`.
            2. Double-click the app. macOS will say it can't verify the developer — click **Done**.
            3. Open **System Settings → Privacy & Security**, scroll down, and click **Open Anyway** next to OpenPhotoCull.
            4. Confirm one more time and the app will launch. Subsequent launches just work.
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin
